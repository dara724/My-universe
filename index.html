<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0e14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Universe">
<title>My Universe</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 680 680'%3E%3Cdefs%3E%3CclipPath id='rc'%3E%3Crect x='40' y='40' width='600' height='600' rx='140'/%3E%3C/clipPath%3E%3CradialGradient id='bg' cx='38%25' cy='32%25' r='75%25'%3E%3Cstop offset='0%25' stop-color='%232d1b4e'/%3E%3Cstop offset='50%25' stop-color='%231a1030'/%3E%3Cstop offset='100%25' stop-color='%230d0818'/%3E%3C/radialGradient%3E%3CradialGradient id='mp' cx='36%25' cy='30%25' r='70%25'%3E%3Cstop offset='0%25' stop-color='%23f5d0fe'/%3E%3Cstop offset='35%25' stop-color='%23d946ef'/%3E%3Cstop offset='100%25' stop-color='%237e22ce'/%3E%3C/radialGradient%3E%3C/defs%3E%3Cg clip-path='url(%23rc)'%3E%3Crect x='40' y='40' width='600' height='600' fill='url(%23bg)'/%3E%3Ccircle cx='340' cy='336' r='148' fill='url(%23mp)'/%3E%3Ctext x='340' y='528' text-anchor='middle' font-family='sans-serif' font-size='38' font-weight='800' fill='%23fdf4ff'%3EMy Universe%3C/text%3E%3C/g%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 680 680'%3E%3Cdefs%3E%3CclipPath id='rc'%3E%3Crect x='40' y='40' width='600' height='600' rx='140'/%3E%3C/clipPath%3E%3CradialGradient id='bg' cx='38%25' cy='32%25' r='75%25'%3E%3Cstop offset='0%25' stop-color='%232d1b4e'/%3E%3Cstop offset='100%25' stop-color='%230d0818'/%3E%3C/radialGradient%3E%3CradialGradient id='mp' cx='36%25' cy='30%25' r='70%25'%3E%3Cstop offset='0%25' stop-color='%23f5d0fe'/%3E%3Cstop offset='100%25' stop-color='%237e22ce'/%3E%3C/radialGradient%3E%3C/defs%3E%3Cg clip-path='url(%23rc)'%3E%3Crect x='40' y='40' width='600' height='600' fill='url(%23bg)'/%3E%3Ccircle cx='340' cy='336' r='148' fill='url(%23mp)'/%3E%3Ctext x='340' y='528' text-anchor='middle' font-family='sans-serif' font-size='38' font-weight='800' fill='%23fdf4ff'%3EMy Universe%3C/text%3E%3C/g%3E%3C/svg%3E">
<style>
:root {
  --bg:#0e0e14; --sf:#16161f; --sf2:#1e1e2a; --bd:#2a2a3a;
  --ac:#7c5cfc; --ac2:#c084fc; --tx:#f0eeff; --dm:#8882aa;
  --me:linear-gradient(135deg,#7c5cfc,#c084fc);
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;}
body{
  font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--tx);
  display:flex;flex-direction:column;
  /* 핵심: 전체 뷰포트 꽉 채우기 */
  position:fixed;inset:0;
}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;width:100%;height:100%;overflow:hidden;}
.screen.active{display:flex;}

/* ══ HOME ══ */
#home{align-items:center;overflow-y:auto;padding:calc(48px + var(--st)) 20px calc(32px + var(--sb));}
.brand{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--ac2);font-weight:500;margin-bottom:6px;}
.home-title{
  font-size:28px;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(135deg,#fff 30%,var(--ac2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:6px;
}
.home-hint{font-size:11px;color:var(--dm);margin-bottom:28px;text-align:center;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:480px;margin-bottom:14px;}
.pcard{
  background:var(--sf);border:1px solid var(--bd);border-radius:18px;
  padding:18px 14px;display:flex;flex-direction:column;align-items:center;
  gap:8px;cursor:pointer;position:relative;user-select:none;
  transition:transform .15s,border-color .15s,box-shadow .15s;
}
.pcard:active{transform:scale(.97);}
.pcard:hover{border-color:var(--ac);box-shadow:0 8px 24px rgba(124,92,252,.18);}
.pcard-av{width:60px;height:60px;border-radius:50%;background:var(--sf2);overflow:hidden;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:24px;}
.pcard-av img{width:100%;height:100%;object-fit:cover;}
.pcard-name{font-size:13px;font-weight:700;text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pcard-meta{font-size:10px;color:var(--dm);text-align:center;}
.pcard-saved{font-size:9px;background:rgba(124,92,252,.18);color:var(--ac2);padding:2px 7px;border-radius:20px;display:inline-block;margin-top:2px;}
.pcard-photo{font-size:9px;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:1px;}
.pcard-photo.linked{background:rgba(110,240,138,.12);color:#6ef08a;}
.pcard-photo.unlinked{background:rgba(136,130,170,.1);color:var(--dm);}
.pcard-del{position:absolute;top:7px;right:9px;background:none;border:none;color:var(--dm);font-size:13px;cursor:pointer;padding:4px 5px;border-radius:6px;}
.pcard-del:active{color:#ff6b6b;}
.home-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:480px;}
.add-btn{
  width:100%;padding:15px;
  background:var(--sf);border:1.5px dashed var(--bd);border-radius:18px;
  color:var(--dm);font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:border-color .15s,color .15s;
}
.add-btn:active{border-color:var(--ac);color:var(--ac2);}
.folder-btn{
  width:100%;padding:13px;
  background:rgba(124,92,252,.08);border:1px solid rgba(124,92,252,.2);border-radius:16px;
  color:var(--ac2);font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.folder-btn:active{background:rgba(124,92,252,.18);}
#install-bar{
  display:none;width:100%;max-width:480px;margin-top:4px;
  background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.25);
  border-radius:16px;padding:12px 16px;cursor:pointer;align-items:center;gap:10px;
}
.ib-txt{flex:1;}
.ib-title{font-size:12px;font-weight:700;color:var(--ac2);}
.ib-sub{font-size:10px;color:var(--dm);margin-top:1px;}

/* ══ MODALS ══ */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);z-index:100;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.msheet{
  background:var(--sf);border-radius:24px 24px 0 0;
  width:100%;max-width:520px;
  padding:28px 22px calc(36px + var(--sb));
  display:flex;flex-direction:column;gap:13px;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhandle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:-10px auto 6px;}
.mtitle{font-size:17px;font-weight:800;}
.msub-txt{font-size:11px;color:var(--dm);margin-top:-4px;}
.urow{background:var(--sf2);border:1px solid var(--bd);border-radius:13px;padding:13px 15px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:border-color .15s;}
.urow:active{border-color:var(--ac);}
.uicon{width:36px;height:36px;border-radius:10px;background:rgba(124,92,252,.15);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.uinfo{flex:1;min-width:0;}
.ulb{font-size:13px;font-weight:600;}
.usb{font-size:11px;color:var(--dm);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.usb.ok{color:#6ef08a;}
.mbtn{border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;width:100%;}
.mbtn.pri{background:var(--ac);}
.mbtn.sec{background:var(--sf2);color:var(--dm);margin-top:-4px;}
.match-box{background:var(--sf2);border:1px solid var(--bd);border-radius:13px;padding:13px 15px;}
.match-title{font-size:12px;font-weight:700;color:var(--dm);margin-bottom:8px;}
.match-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;}
.match-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.match-dot.ok{background:#6ef08a;}
.match-dot.no{background:var(--bd);}
.match-name{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.match-count{color:var(--dm);font-size:11px;}

/* ══ VIEWER ══ */
#viewer{position:relative;}

/* 헤더 고정 */
.vhead{
  flex-shrink:0;
  background:var(--sf);border-bottom:1px solid var(--bd);
  padding:calc(12px + var(--st)) 14px 12px;
  display:flex;align-items:center;gap:9px;
  z-index:10;
}
.vback{background:none;border:none;font-size:22px;color:var(--dm);cursor:pointer;padding:4px 6px;border-radius:8px;line-height:1;flex-shrink:0;}
.vav{width:36px;height:36px;border-radius:50%;background:var(--sf2);overflow:hidden;flex-shrink:0;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:16px;}
.vav img{width:100%;height:100%;object-fit:cover;}
.vtb{flex:1;min-width:0;}
.vtitle{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vsub{font-size:10px;color:var(--dm);}
.vbtns{display:flex;gap:5px;flex-shrink:0;}
.vbtn{background:var(--sf2);border:1px solid var(--bd);border-radius:9px;padding:6px 9px;font-size:11px;color:var(--dm);cursor:pointer;white-space:nowrap;}
.vbtn:active{border-color:var(--ac);color:var(--ac2);}

/* ── 검색바 ── */
.search-bar{
  flex-shrink:0;
  background:var(--sf);border-bottom:1px solid var(--bd);
  padding:8px 12px;
  display:none;align-items:center;gap:8px;
}
.search-bar.open{display:flex;}
.search-input{
  flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;
  padding:8px 12px;font-size:13px;color:var(--tx);outline:none;
  font-family:inherit;
}
.search-input:focus{border-color:var(--ac);}
.search-input::placeholder{color:var(--dm);}
.search-nav{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.snav-btn{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:6px 10px;font-size:13px;color:var(--dm);cursor:pointer;}
.snav-btn:active{border-color:var(--ac);color:var(--tx);}
.search-count{font-size:11px;color:var(--dm);white-space:nowrap;min-width:40px;text-align:center;}
.search-close{background:none;border:none;font-size:17px;color:var(--dm);cursor:pointer;padding:4px;}

/* 미디어 배너 */
.media-banner{
  flex-shrink:0;
  margin:6px 12px 0;background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.25);
  border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;
}
.mb-txt{font-size:12px;color:var(--ac2);flex:1;}

/* 메시지 영역 - flex:1로 나머지 공간 전부 차지 */
.msgs{
  flex:1;
  overflow-y:auto;
  padding:14px 12px calc(14px + var(--sb));
  display:flex;flex-direction:column;
  /* 가로 꽉 채우기 */
  width:100%;
  scrollbar-width:thin;scrollbar-color:var(--bd) transparent;
}

.dsep{text-align:center;font-size:11px;color:var(--dm);margin:16px 0 8px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.dsep::before,.dsep::after{content:'';flex:1;height:1px;background:var(--bd);}
/* 검색 하이라이트 */
.dsep.search-hit{background:rgba(124,92,252,.08);border-radius:8px;padding:4px 8px;}

.mrow{display:flex;align-items:flex-end;gap:6px;margin-bottom:2px;width:100%;}
.mrow.me{flex-direction:row-reverse;}
.mrow.them{flex-direction:row;}

.mav{width:32px;height:32px;border-radius:50%;background:var(--sf2);overflow:hidden;flex-shrink:0;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:13px;}
.mav img{width:100%;height:100%;object-fit:cover;}
.maph{width:32px;flex-shrink:0;}

/* 말풍선 컨테이너 - max-width를 충분히 */
.mcont{max-width:75%;display:flex;flex-direction:column;}
.mrow.me .mcont{align-items:flex-end;}
.mrow.them .mcont{align-items:flex-start;}

.mname{font-size:10px;color:var(--dm);margin-bottom:2px;padding-left:2px;}

.mrow.them .bubble{background:var(--sf2);border:1px solid var(--bd);border-radius:4px 16px 16px 16px;color:var(--tx);}
.mrow.me .bubble{background:var(--me);border-radius:16px 4px 16px 16px;color:#fff;}
.bubble{padding:8px 12px;font-size:14px;line-height:1.55;word-break:break-word;white-space:pre-wrap;max-width:100%;}

/* 검색 하이라이트 */
.bubble.search-hit{outline:2px solid var(--ac);outline-offset:2px;}
mark{background:rgba(255,220,80,.35);color:inherit;border-radius:2px;padding:0 1px;}

.mtime{font-size:10px;color:var(--dm);margin:2px 3px 0;align-self:flex-end;white-space:nowrap;}
.bimg{max-width:200px;max-height:200px;border-radius:12px;object-fit:cover;cursor:pointer;display:block;border:1px solid var(--bd);}
.iph{background:var(--sf2);border:1px solid var(--bd);border-radius:12px;padding:9px 13px;font-size:12px;color:var(--dm);}

/* ══ CALENDAR ══ */
#cal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);z-index:200;align-items:flex-end;justify-content:center;}
#cal-bg.open{display:flex;}
.cal-sheet{background:var(--sf);border-radius:24px 24px 0 0;width:100%;max-width:520px;padding:22px 18px calc(40px + var(--sb));animation:slideUp .22s ease;}
.cal-head{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.cal-ym{font-size:16px;font-weight:800;flex:1;}
.cnav{background:var(--sf2);border:1px solid var(--bd);border-radius:9px;padding:6px 11px;font-size:15px;color:var(--dm);cursor:pointer;line-height:1;}
.cclose{background:none;border:none;font-size:19px;color:var(--dm);cursor:pointer;padding:4px 7px;border-radius:8px;}
.wdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px;}
.wd{text-align:center;font-size:10px;color:var(--dm);padding:3px 0;font-weight:600;}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cday{aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--dm);border:none;background:transparent;cursor:default;}
.cday.has{background:var(--sf2);color:var(--tx);cursor:pointer;font-weight:700;border:1px solid var(--bd);}
.cday.has:active{background:var(--ac);color:#fff;border-color:var(--ac);}

/* ══ LIGHTBOX ══ */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:300;align-items:center;justify-content:center;cursor:zoom-out;}
#lb.open{display:flex;}
#lb img{max-width:94vw;max-height:94vh;border-radius:10px;}

/* ══ LOADING ══ */
#loading{display:none;position:fixed;inset:0;background:rgba(14,14,20,.9);z-index:400;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#loading.show{display:flex;}
.spin{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:rot .7s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}
.ltxt{font-size:13px;color:var(--tx);}
.lsub{font-size:11px;color:var(--dm);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="screen" id="home">
  <div class="brand">Private Archive</div>
  <div class="home-title">My Universe ✦</div>
  <div class="home-hint">CSV는 영구저장 · 사진은 열 때마다 폴더 선택</div>
  <div class="pgrid" id="pgrid"></div>
  <div class="home-btns">
    <button class="add-btn" id="addbtn" onclick="openSetup()">＋ &nbsp;새 대화 추가</button>
    <button class="folder-btn" id="folder-match-btn" style="display:none" onclick="document.getElementById('mfolders').click()">📂 &nbsp;사진 폴더 자동 매칭 (5개 한번에)</button>
  </div>
  <div id="install-bar" onclick="installPWA()">
    <span style="font-size:22px">📲</span>
    <div class="ib-txt">
      <div class="ib-title">홈 화면에 앱으로 설치</div>
      <div class="ib-sub">설치하면 앱처럼 바로 열 수 있어요</div>
    </div>
  </div>
</div>

<!-- ══ VIEWER ══ -->
<div class="screen" id="viewer">
  <!-- 고정 헤더 -->
  <div class="vhead">
    <button class="vback" onclick="goHome()">‹</button>
    <div class="vav" id="vav">💜</div>
    <div class="vtb">
      <div class="vtitle" id="vtitle">—</div>
      <div class="vsub" id="vsub">—</div>
    </div>
    <div class="vbtns">
      <button class="vbtn" onclick="toggleSearch()">🔍</button>
      <button class="vbtn" onclick="document.getElementById('mi2').click()">🖼</button>
      <button class="vbtn" onclick="openCal()">📅</button>
    </div>
  </div>

  <!-- 검색바 (토글) -->
  <div class="search-bar" id="search-bar">
    <input class="search-input" id="search-input" type="text" placeholder="메시지 검색..." oninput="onSearchInput()">
    <div class="search-nav">
      <span class="search-count" id="search-count"></span>
      <button class="snav-btn" onclick="searchNav(-1)">↑</button>
      <button class="snav-btn" onclick="searchNav(1)">↓</button>
    </div>
    <button class="search-close" onclick="closeSearch()">✕</button>
  </div>

  <!-- 미디어 배너 -->
  <div id="media-banner" class="media-banner" style="display:none" onclick="document.getElementById('mi2').click()">
    <span>🖼</span>
    <div class="mb-txt">사진 폴더를 선택하면 이미지를 볼 수 있어요 →</div>
  </div>

  <!-- 메시지 영역 -->
  <div class="msgs" id="msgs"></div>
</div>

<input type="file" id="mi2" multiple webkitdirectory directory style="display:none" onchange="onMediaViewer(this)">
<input type="file" id="mfolders" multiple webkitdirectory directory style="display:none" onchange="onFolders(this)">

<!-- ══ SETUP MODAL ══ -->
<div class="modal-bg" id="setup-modal">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mtitle">새 대화 추가</div>
    <div class="msub-txt">CSV는 영구저장 · 사진은 열 때마다 폴더 선택</div>
    <div class="urow" onclick="document.getElementById('ci').click()">
      <div class="uicon">📋</div>
      <div class="uinfo"><div class="ulb">메시지 CSV 불러오기</div><div class="usb" id="csub">파일을 선택해주세요</div></div>
    </div>
    <div class="urow" onclick="document.getElementById('pi').click()">
      <div class="uicon">👤</div>
      <div class="uinfo"><div class="ulb">프로필 사진 (선택)</div><div class="usb" id="psub">선택 안 됨</div></div>
    </div>
    <button class="mbtn pri" onclick="saveProfile()">저장하고 보러가기 →</button>
    <button class="mbtn sec" onclick="closeSetup()">취소</button>
  </div>
</div>

<!-- ══ MATCH MODAL ══ -->
<div class="modal-bg" id="match-modal">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mtitle">📂 폴더 자동 매칭</div>
    <div class="msub-txt">파일명 패턴으로 어느 대화 폴더인지 찾았어요</div>
    <div class="match-box">
      <div class="match-title">매칭 결과</div>
      <div id="match-rows"></div>
    </div>
    <button class="mbtn pri" onclick="applyMatch()">이대로 적용하기</button>
    <button class="mbtn sec" onclick="closeMatch()">취소</button>
  </div>
</div>

<input type="file" id="ci" accept=".csv" style="display:none" onchange="onCSV(this)">
<input type="file" id="pi" accept="image/*" style="display:none" onchange="onProfile(this)">

<!-- ══ CALENDAR ══ -->
<div id="cal-bg">
  <div class="cal-sheet">
    <div class="cal-head">
      <button class="cnav" onclick="calPrev()">‹</button>
      <div class="cal-ym" id="cal-ym"></div>
      <button class="cnav" onclick="calNext()">›</button>
      <button class="cclose" onclick="closeCal()">✕</button>
    </div>
    <div class="wdays">
      <div class="wd" style="color:#ff7070">일</div>
      <div class="wd">월</div><div class="wd">화</div><div class="wd">수</div>
      <div class="wd">목</div><div class="wd">금</div>
      <div class="wd" style="color:#7abaff">토</div>
    </div>
    <div class="cgrid" id="cgrid"></div>
  </div>
</div>

<div id="lb" onclick="this.classList.remove('open')"><img id="lbimg" src="" alt=""></div>
<div id="loading">
  <div class="spin"></div>
  <div class="ltxt" id="ltxt">로딩 중...</div>
  <div class="lsub" id="lsub"></div>
</div>

<script>
// ══ IndexedDB ══
const DB={name:'MyUniverse2',ver:1,store:'profiles'};
let db=null;
function openDB(){
  return new Promise((ok,fail)=>{
    const r=indexedDB.open(DB.name,DB.ver);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(DB.store,{keyPath:'id',autoIncrement:true});
    r.onsuccess=e=>{db=e.target.result;ok();};
    r.onerror=e=>fail(e.target.error);
  });
}
const tx=(mode='readonly')=>db.transaction(DB.store,mode).objectStore(DB.store);
const dbGetAll=()=>new Promise((ok,f)=>{const r=tx().getAll();r.onsuccess=e=>ok(e.target.result);r.onerror=f;});
const dbPut=obj=>new Promise((ok,f)=>{const r=tx('readwrite').put(obj);r.onsuccess=e=>ok(e.target.result);r.onerror=f;});
const dbDel=id=>new Promise((ok,f)=>{const r=tx('readwrite').delete(id);r.onsuccess=ok;r.onerror=f;});

// ══ STATE ══
let profiles=[],draft={csv:null,profData:null},activeIdx=-1;
let parsedMsgs=[],msgDates=new Set(),calY=2021,calM=0;
let activeMedia={},pendingMatchResult=null,deferredInstall=null;

// 검색 상태
let searchHits=[],searchIdx=0;

// ══ SCREEN ══
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
window.addEventListener('popstate',()=>{
  if(document.getElementById('viewer').classList.contains('active'))goHome();
  history.pushState(null,'',location.href);
});

// ══ PWA ══
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredInstall=e;
  document.getElementById('install-bar').style.display='flex';
});
function installPWA(){
  if(!deferredInstall)return;
  deferredInstall.prompt();
  deferredInstall.userChoice.then(()=>{deferredInstall=null;document.getElementById('install-bar').style.display='none';});
}

// ══ HOME ══
function renderHome(){
  const grid=document.getElementById('pgrid');
  grid.innerHTML='';
  profiles.forEach((p,i)=>{
    const card=document.createElement('div');card.className='pcard';card.onclick=()=>openViewer(i);
    const av=document.createElement('div');av.className='pcard-av';
    av.innerHTML=p.profData?`<img src="${p.profData}">`:'💜';
    const nm=document.createElement('div');nm.className='pcard-name';nm.textContent=p.name||'이름 없음';
    const mt=document.createElement('div');mt.className='pcard-meta';mt.textContent=(p.msgCount||0).toLocaleString()+'개 메시지';
    const sv=document.createElement('div');sv.className='pcard-saved';sv.textContent='✓ 저장됨';
    const hasMedia=p._media&&Object.keys(p._media).length>0;
    const ph=document.createElement('div');
    ph.className='pcard-photo '+(hasMedia?'linked':'unlinked');
    ph.textContent=hasMedia?'🖼 사진 연결됨':'🖼 사진 미연결';
    const del=document.createElement('button');del.className='pcard-del';del.textContent='✕';
    del.onclick=e=>{e.stopPropagation();delProfile(i);};
    card.append(av,nm,mt,sv,ph,del);
    grid.appendChild(card);
  });
  document.getElementById('addbtn').style.display=profiles.length>=4?'none':'flex';
  document.getElementById('folder-match-btn').style.display=profiles.length>0?'flex':'none';
}

async function delProfile(i){
  if(!confirm(`"${profiles[i].name}" 대화를 삭제할까요?`))return;
  await dbDel(profiles[i].id);
  profiles.splice(i,1);
  renderHome();
}

// ══ SETUP ══
function openSetup(){
  draft={csv:null,profData:null};
  document.getElementById('csub').textContent='파일을 선택해주세요';
  document.getElementById('psub').textContent='선택 안 됨';
  ['csub','psub'].forEach(id=>document.getElementById(id).classList.remove('ok'));
  document.getElementById('setup-modal').classList.add('open');
}
function closeSetup(){document.getElementById('setup-modal').classList.remove('open');}

function onCSV(inp){
  const f=inp.files[0];if(!f)return;
  showLoad('CSV 읽는 중...','');
  const r=new FileReader();
  r.onload=e=>{
    draft.csv=e.target.result;
    document.getElementById('csub').textContent='✓ '+f.name;
    document.getElementById('csub').classList.add('ok');
    hideLoad();
  };
  r.readAsText(f,'EUC-KR');
  inp.value='';
}

function onProfile(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    draft.profData=e.target.result;
    document.getElementById('psub').textContent='✓ '+f.name;
    document.getElementById('psub').classList.add('ok');
  };
  r.readAsDataURL(f);
  inp.value='';
}

async function saveProfile(){
  if(!draft.csv){alert('CSV 파일을 먼저 선택해주세요!');return;}
  showLoad('저장 중...','IndexedDB에 영구저장 중');
  await sleep(50);
  const msgs=parseCSV(draft.csv);
  const{me}=detectSenders(msgs);
  const others=[...new Set(msgs.map(r=>r.nickname).filter(n=>n!==me))];
  const name=others[0]||'알 수 없음';
  const dates=msgs.map(m=>m.datetime.split(' ')[0]).filter(Boolean);
  const profile={name,msgCount:msgs.length,dateRange:dates.length?`${dates[0]} ~ ${dates[dates.length-1]}`:'',profData:draft.profData||null,csvText:draft.csv};
  const newId=await dbPut(profile);
  profile.id=newId;
  profiles.push(profile);
  renderHome();closeSetup();hideLoad();
  openViewer(profiles.length-1,msgs,{});
}

// ══ MULTI-FOLDER MATCH ══
function onFolders(inp){
  const allFiles=Array.from(inp.files);
  if(!allFiles.length)return;
  inp.value='';
  showLoad('폴더 분석 중...',allFiles.length.toLocaleString()+'개 파일');
  setTimeout(()=>{
    const folderMap={};
    allFiles.forEach(f=>{
      const folder=f.webkitRelativePath.split('/')[0];
      if(!folderMap[folder])folderMap[folder]=[];
      folderMap[folder].push(f);
    });
    const folderNames=Object.keys(folderMap);
    const matchResult=[];
    profiles.forEach((p,pi)=>{
      const msgs=p._cachedMsgs||(p.csvText?parseCSV(p.csvText):[]);
      if(!p._cachedMsgs)p._cachedMsgs=msgs;
      const refFiles=new Set(msgs.filter(m=>m.type==='IMAGE'||m.type==='VIDEO').map(m=>m.message.trim()));
      let bestFolder=null,bestCount=0,bestMap={};
      folderNames.forEach(fn=>{
        const mediaMap={};let count=0;
        folderMap[fn].forEach(f=>{mediaMap[f.name]=URL.createObjectURL(f);if(refFiles.has(f.name))count++;});
        if(count>bestCount){bestCount=count;bestFolder=fn;bestMap=mediaMap;}
      });
      if(bestCount===0&&folderNames[pi]){
        bestFolder=folderNames[pi];bestMap={};
        folderMap[folderNames[pi]].forEach(f=>{bestMap[f.name]=URL.createObjectURL(f);});
      }
      matchResult.push({profileIdx:pi,folderName:bestFolder,matchedCount:bestCount,mediaMap:bestMap});
    });
    hideLoad();
    showMatchModal(matchResult);
  },100);
}

function showMatchModal(result){
  pendingMatchResult=result;
  const rows=document.getElementById('match-rows');rows.innerHTML='';
  result.forEach(r=>{
    const p=profiles[r.profileIdx];
    const row=document.createElement('div');row.className='match-row';
    const dot=document.createElement('div');dot.className='match-dot '+(r.matchedCount>0?'ok':'no');
    const nm=document.createElement('div');nm.className='match-name';nm.textContent=p.name;
    const info=document.createElement('div');info.className='match-count';
    if(r.folderName&&r.matchedCount>0)info.textContent=`📂 ${r.folderName} (${r.matchedCount}개 매칭)`;
    else if(r.folderName)info.textContent=`📂 ${r.folderName} (순서 할당)`;
    else info.textContent='매칭 실패';
    row.append(dot,nm,info);rows.appendChild(row);
  });
  document.getElementById('match-modal').classList.add('open');
}

function applyMatch(){
  if(!pendingMatchResult)return;
  pendingMatchResult.forEach(r=>{if(r.mediaMap&&Object.keys(r.mediaMap).length>0)profiles[r.profileIdx]._media=r.mediaMap;});
  pendingMatchResult=null;
  document.getElementById('match-modal').classList.remove('open');
  renderHome();
  alert('사진이 연결됐어요! 각 대화를 열면 사진이 보여요 🎉');
}
function closeMatch(){pendingMatchResult=null;document.getElementById('match-modal').classList.remove('open');}

// ══ VIEWER ══
function openViewer(idx,preMsg,preMedia){
  activeIdx=idx;
  const p=profiles[idx];
  showLoad('메시지 불러오는 중...','');
  setTimeout(()=>{
    const msgs=preMsg||p._cachedMsgs||(p.csvText?parseCSV(p.csvText):[]);
    if(!p._cachedMsgs)p._cachedMsgs=msgs;
    const media=(preMedia&&Object.keys(preMedia).length>0)?preMedia:(p._media||{});
    parsedMsgs=msgs;activeMedia=media;
    msgDates=new Set(msgs.map(m=>m.datetime.split(' ')[0]).filter(Boolean));
    document.getElementById('vav').innerHTML=p.profData?`<img src="${p.profData}">`:'💜';
    document.getElementById('vtitle').textContent=p.name;
    document.getElementById('vsub').textContent=msgs.length.toLocaleString()+'개 메시지';
    const hasMedia=Object.keys(media).length>0;
    document.getElementById('media-banner').style.display=hasMedia?'none':'flex';
    // 검색 초기화
    closeSearch();
    renderMsgs(msgs,media);
    show('viewer');
    history.pushState(null,'',location.href);
    hideLoad();
  },80);
}

function onMediaViewer(inp){
  const files=Array.from(inp.files);if(!files.length)return;
  showLoad('사진 연결 중...',files.length.toLocaleString()+'개');
  setTimeout(()=>{
    activeMedia={};
    files.forEach(f=>{activeMedia[f.name]=URL.createObjectURL(f);});
    profiles[activeIdx]._media=activeMedia;
    document.getElementById('media-banner').style.display='none';
    renderMsgs(parsedMsgs,activeMedia);
    renderHome();hideLoad();
  },80);
  inp.value='';
}

function goHome(){
  show('home');
  parsedMsgs=[];msgDates=new Set();activeMedia={};
  closeSearch();
}

// ══ SEARCH ══
function toggleSearch(){
  const bar=document.getElementById('search-bar');
  if(bar.classList.contains('open')){
    closeSearch();
  } else {
    bar.classList.add('open');
    document.getElementById('search-input').focus();
  }
}

function closeSearch(){
  document.getElementById('search-bar').classList.remove('open');
  document.getElementById('search-input').value='';
  document.getElementById('search-count').textContent='';
  // 하이라이트 제거
  document.querySelectorAll('.bubble.search-hit').forEach(el=>el.classList.remove('search-hit'));
  document.querySelectorAll('mark').forEach(el=>{
    const txt=document.createTextNode(el.textContent);
    el.replaceWith(txt);
  });
  searchHits=[];searchIdx=0;
}

function onSearchInput(){
  const q=document.getElementById('search-input').value.trim();
  // 이전 하이라이트 초기화
  document.querySelectorAll('.bubble.search-hit').forEach(el=>el.classList.remove('search-hit'));
  document.querySelectorAll('mark').forEach(el=>{
    const p=el.parentNode;
    p.replaceChild(document.createTextNode(el.textContent),el);
    p.normalize();
  });
  searchHits=[];searchIdx=0;
  document.getElementById('search-count').textContent='';
  if(!q||q.length<1)return;

  // 말풍선에서 검색 + 하이라이트
  const bubbles=document.querySelectorAll('.bubble');
  bubbles.forEach(b=>{
    if(b.textContent.includes(q)){
      highlightText(b,q);
      b.classList.add('search-hit');
      searchHits.push(b);
    }
  });

  if(searchHits.length>0){
    document.getElementById('search-count').textContent=`1/${searchHits.length}`;
    searchHits[0].scrollIntoView({behavior:'smooth',block:'center'});
    searchIdx=0;
  } else {
    document.getElementById('search-count').textContent='없음';
  }
}

function highlightText(el,q){
  const walker=document.createTreeWalker(el,NodeFilter.SHOW_TEXT);
  const nodes=[];
  while(walker.nextNode())nodes.push(walker.currentNode);
  nodes.forEach(node=>{
    const txt=node.textContent;
    const idx=txt.indexOf(q);
    if(idx===-1)return;
    const before=document.createTextNode(txt.slice(0,idx));
    const mark=document.createElement('mark');mark.textContent=q;
    const after=document.createTextNode(txt.slice(idx+q.length));
    const frag=document.createDocumentFragment();
    frag.append(before,mark,after);
    node.replaceWith(frag);
  });
}

function searchNav(dir){
  if(!searchHits.length)return;
  searchIdx=(searchIdx+dir+searchHits.length)%searchHits.length;
  document.getElementById('search-count').textContent=`${searchIdx+1}/${searchHits.length}`;
  searchHits[searchIdx].scrollIntoView({behavior:'smooth',block:'center'});
}

// ══ PARSE CSV ══
function parseCSV(txt){
  const lines=txt.split('\n');const rows=[];let i=1;
  while(i<lines.length){
    let line=lines[i];if(!line.trim()){i++;continue;}
    while((line.match(/"/g)||[]).length%2!==0&&i+1<lines.length){i++;line+='\n'+lines[i];}
    const cols=splitLine(line);
    if(cols.length>=4)rows.push({nickname:cols[0].trim(),type:cols[1].trim().toUpperCase(),message:cols[2].trim(),datetime:(cols[4]||cols[3]).trim()});
    i++;
  }
  return rows;
}
function splitLine(s){
  const r=[];let c='';let q=false;
  for(let i=0;i<s.length;i++){
    if(s[i]==='"'){if(q&&s[i+1]==='"'){c+='"';i++;}else q=!q;}
    else if(s[i]===','&&!q){r.push(c);c='';}
    else c+=s[i];
  }
  r.push(c);return r;
}
function detectSenders(rows){const first=rows.find(r=>r.type==='TEXT')?.nickname;return{me:first};}
function fmtTime(dt){
  const p=dt.split(' ');if(p.length<2)return'';
  const[h,m]=p[1].split(':');let hh=parseInt(h);
  const ap=hh>=12?'오후':'오전';if(hh>12)hh-=12;if(hh===0)hh=12;
  return`${ap} ${hh}:${m}`;
}
function fmtDate(dt){
  const d=new Date(dt.replace(' ','T'));
  if(isNaN(d))return dt.split(' ')[0];
  return d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
}

// ══ RENDER MESSAGES ══
function renderMsgs(rows,media){
  const wrap=document.getElementById('msgs');wrap.innerHTML='';
  const{me}=detectSenders(rows);let lastDate='';const p=profiles[activeIdx];
  rows.forEach((row,idx)=>{
    const dk=row.datetime.split(' ')[0];
    if(dk!==lastDate){
      lastDate=dk;
      const sep=document.createElement('div');sep.className='dsep';sep.dataset.date=dk;sep.textContent=fmtDate(row.datetime);
      wrap.appendChild(sep);
    }
    const isMe=row.nickname===me;
    const prev=rows[idx-1];
    const sameG=prev&&prev.nickname===row.nickname&&prev.datetime.split(' ')[0]===dk;
    const mrow=document.createElement('div');mrow.className='mrow '+(isMe?'me':'them');

    if(!isMe){
      if(!sameG){
        const av=document.createElement('div');av.className='mav';
        av.innerHTML=p&&p.profData?`<img src="${p.profData}">`:'💜';
        mrow.appendChild(av);
      } else {
        const ph=document.createElement('div');ph.className='maph';mrow.appendChild(ph);
      }
    }

    const cont=document.createElement('div');cont.className='mcont';
    if(!isMe&&!sameG){const n=document.createElement('div');n.className='mname';n.textContent=row.nickname;cont.appendChild(n);}

    if(row.type==='IMAGE'){
      const fn=row.message.trim();
      if(media&&media[fn]){
        const img=document.createElement('img');img.src=media[fn];img.className='bimg';img.loading='lazy';
        img.onclick=()=>{document.getElementById('lbimg').src=media[fn];document.getElementById('lb').classList.add('open');};
        cont.appendChild(img);
      } else {
        const ph=document.createElement('div');ph.className='iph';ph.textContent='🖼 '+fn;cont.appendChild(ph);
      }
    } else if(row.type==='VIDEO'){
      const fn=row.message.trim();
      if(media&&media[fn]){
        const v=document.createElement('video');v.src=media[fn];v.controls=true;v.style.cssText='max-width:200px;border-radius:12px;';
        cont.appendChild(v);
      } else {
        const ph=document.createElement('div');ph.className='iph';ph.textContent='🎬 '+fn;cont.appendChild(ph);
      }
    } else {
      const b=document.createElement('div');b.className='bubble';b.textContent=row.message;cont.appendChild(b);
    }

    const t=document.createElement('div');t.className='mtime';t.textContent=fmtTime(row.datetime);cont.appendChild(t);
    mrow.appendChild(cont);wrap.appendChild(mrow);
  });
}

// ══ CALENDAR ══
function openCal(){
  if(msgDates.size>0){const first=[...msgDates].sort()[0];calY=parseInt(first.split('-')[0]);calM=parseInt(first.split('-')[1])-1;}
  renderCal();document.getElementById('cal-bg').classList.add('open');
}
function closeCal(){document.getElementById('cal-bg').classList.remove('open');}
function calPrev(){calM--;if(calM<0){calM=11;calY--;}renderCal();}
function calNext(){calM++;if(calM>11){calM=0;calY++;}renderCal();}
function renderCal(){
  document.getElementById('cal-ym').textContent=`${calY}년 ${calM+1}월`;
  const grid=document.getElementById('cgrid');grid.innerHTML='';
  const fd=new Date(calY,calM,1).getDay(),dim=new Date(calY,calM+1,0).getDate();
  for(let i=0;i<fd;i++){const b=document.createElement('div');b.className='cday';grid.appendChild(b);}
  for(let d=1;d<=dim;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has=msgDates.has(ds);
    const cell=document.createElement('div');cell.className='cday'+(has?' has':'');cell.textContent=d;
    if(has){cell.onclick=()=>{const tgt=document.querySelector(`.dsep[data-date="${ds}"]`);if(tgt){closeCal();setTimeout(()=>tgt.scrollIntoView({behavior:'smooth',block:'start'}),120);}};}
    grid.appendChild(cell);
  }
}

// ══ UTIL ══
function showLoad(msg,sub){document.getElementById('ltxt').textContent=msg;document.getElementById('lsub').textContent=sub||'';document.getElementById('loading').classList.add('show');}
function hideLoad(){document.getElementById('loading').classList.remove('show');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

init();
